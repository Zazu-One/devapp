<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/devapp/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="zazu_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>zazu_app</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Keeping everything in index.html for faster loading */
    body {
      background: #0a0a30;
    }

    @keyframes logo_animation {
      from {
        top: 0%;
        opacity: 0;
      }
      to {
        top: 50%;
        opacity: 1
      }
    }

    /* Safari and Chrome */
    @-webkit-keyframes logo_animation {
      from {
        top: 0%;
        opacity: 0;
      }
      to {
        top: 50%;
        opacity: 1;
      }
    }

    .logo {
      margin: 0;
      position: absolute;
      top: 0%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      animation: logo_animation 2s ease-out forwards;
      animation-iteration-count: 1;
      /* Safari and Chrome */
      -webkit-animation: logo_animation 2s ease-out forwards;
      -webkit-animation-iteration-count: 1;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #0a0a30;
      }
    }
  </style>

  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = '4056257891';
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer=""></script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>
    function removeSplash() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>

<body>
  <picture id="splash">
    <source
      srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x"
      media="(prefers-color-scheme: light)">
    <source
      srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x"
      media="(prefers-color-scheme: dark)">
    <img class="logo" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  <script>
    window.addEventListener('load', function (ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        }
      }).then(function (engineInitializer) {
        return engineInitializer.initializeEngine();
      }).then(function (appRunner) {
        return appRunner.runApp();
        removeSplash();
      });
    });
  </script>


</body>

</html>
